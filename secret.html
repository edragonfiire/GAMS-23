<script>
document.addEventListener("DOMContentLoaded", () => {
    const CARD_CLASS = ".game-link";

    const standaloneStyles = document.createElement('style');
    standaloneStyles.innerHTML = `
        /* Strictly enforces the 7-column desktop density grid layout */
        .game-list { 
            display: grid !important; 
            grid-template-columns: repeat(7, 1fr) !important; 
            gap: 24px !important; 
            justify-items: center !important; 
            width: 100% !important;
            max-width: 1280px !important;
            margin: 30px auto 0 auto !important;
        }

        ${CARD_CLASS} {
            position: relative !important;
            box-sizing: border-box !important;
        }

        /* Golden floating bookmark overlay star styles */
        .gams-star-overlay-btn {
            position: absolute !important;
            top: 6px !important;
            right: 6px !important;
            z-index: 99999 !important;
            background: rgba(0, 0, 0, 0.75) !important;
            border: 1px solid rgba(255, 255, 255, 0.12) !important;
            border-radius: 50% !important;
            width: 26px !important;
            height: 26px !important;
            font-size: 13px !important;
            color: #555 !important;
            cursor: pointer !important;
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            transition: transform 0.1s ease, color 0.12s ease !important;
        }
        .gams-star-overlay-btn:hover { transform: scale(1.15) !important; }
        ${CARD_CLASS}.is-gams-bookmarked .gams-star-overlay-btn {
            color: #ffcc00 !important;
            text-shadow: 0 0 4px rgba(255, 204, 0, 0.6) !important;
        }
    `;
    document.head.appendChild(standaloneStyles);

    let bookmarksArray = JSON.parse(localStorage.getItem("gams_v4_bookmarks")) || [];

    const runLayoutOverwatch = () => {
        const gameCards = document.querySelectorAll(CARD_CLASS);
        
        gameCards.forEach((card, index) => {
            if (card.querySelector('.gams-star-overlay-btn')) return;

            const titleTextNode = card.querySelector('div') || card.querySelector('p');
            const internalGameId = card.getAttribute("data-id") || (titleTextNode ? titleTextNode.innerText.trim().replace(/\s+/g, '-').toLowerCase() : `game-${index}`);
            card.setAttribute("data-id", internalGameId);

            const actionStarBtn = document.createElement("button");
            actionStarBtn.className = "gams-star-overlay-btn";
            actionStarBtn.innerHTML = "★";
            card.appendChild(actionStarBtn);

            if (bookmarksArray.includes(internalGameId)) {
                card.classList.add("is-gams-bookmarked");
            }

            actionStarBtn.addEventListener("click", (clickEvent) => {
                clickEvent.preventDefault();
                clickEvent.stopPropagation();

                if (bookmarksArray.includes(internalGameId)) {
                    bookmarksArray = bookmarksArray.filter(savedId => savedId !== internalGameId);
                    card.classList.remove("is-gams-bookmarked");
                } else {
                    bookmarksArray.push(internalGameId);
                    card.classList.add("is-gams-bookmarked");
                }

                localStorage.setItem("gams_v4_bookmarks", JSON.stringify(bookmarksArray));
                applyLayoutFlexSorting(gameCards);
            });
        });

        applyLayoutFlexSorting(gameCards);
    };

    function applyLayoutFlexSorting(cards) {
        cards.forEach(card => {
            const currentId = card.getAttribute("data-id");
            if (bookmarksArray.includes(currentId)) {
                card.style.order = "-1"; 
            } else {
                card.style.order = "0";
            }
        });
    }

    runLayoutOverwatch();
    setInterval(runLayoutOverwatch, 1000);
});
</script>

    <script>
    const canvas = document.getElementById('spaceCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    const numStars = 150;
    const stars = [];
    for (let i = 0; i < numStars; i++) {
        stars.push({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            size: Math.random() * 2 + 0.5,
            speedFactor: Math.random() * 0.03 + 0.01 
        });
    }

    function animate() {
        ctx.fillStyle = '#06060c'; // Deep space background color
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        stars.forEach(star => {
            let dx = mouse.x - star.x;
            let dy = mouse.y - star.y;

            star.x += dx * star.speedFactor;
            star.y += dy * star.speedFactor;

            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.fill();

            if (Math.abs(dx) < 20 && Math.abs(dy) < 20) {
                star.x = Math.random() * canvas.width;
                star.y = Math.random() * canvas.height;
            }
        });

        requestAnimationFrame(animate);
    }
    animate();
</script>

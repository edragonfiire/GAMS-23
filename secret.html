<script>
document.addEventListener("DOMContentLoaded", () => {
    const CARD_CLASS = ".game-link";

    const standaloneStyles = document.createElement('style');
    standaloneStyles.innerHTML = `
        /* Strictly enforces the 7-column desktop density grid layout */
        .game-list { 
            display: grid !important; 
            grid-template-columns: repeat(7, 1fr) !important; 
            gap: 24px !important; 
            justify-items: center !important; 
            width: 100% !important;
            max-width: 1280px !important;
            margin: 30px auto 0 auto !important;
        }

        ${CARD_CLASS} {
            position: relative !important;
            box-sizing: border-box !important;
        }

        /* Golden floating bookmark overlay star styles */
        .gams-star-overlay-btn {
            position: absolute !important;
            top: 6px !important;
            right: 6px !important;
            z-index: 99999 !important;
            background: rgba(0, 0, 0, 0.75) !important;
            border: 1px solid rgba(255, 255, 255, 0.12) !important;
            border-radius: 50% !important;
            width: 26px !important;
            height: 26px !important;
            font-size: 13px !important;
            color: #555 !important;
            cursor: pointer !important;
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            transition: transform 0.1s ease, color 0.12s ease !important;
        }
        .gams-star-overlay-btn:hover { transform: scale(1.15) !important; }
        ${CARD_CLASS}.is-gams-bookmarked .gams-star-overlay-btn {
            color: #ffcc00 !important;
            text-shadow: 0 0 4px rgba(255, 204, 0, 0.6) !important;
        }
    `;
    document.head.appendChild(standaloneStyles);

    let bookmarksArray = JSON.parse(localStorage.getItem("gams_v4_bookmarks")) || [];

    const runLayoutOverwatch = () => {
        const gameCards = document.querySelectorAll(CARD_CLASS);
        
        gameCards.forEach((card, index) => {
            if (card.querySelector('.gams-star-overlay-btn')) return;

            const titleTextNode = card.querySelector('div') || card.querySelector('p');
            const internalGameId = card.getAttribute("data-id") || (titleTextNode ? titleTextNode.innerText.trim().replace(/\s+/g, '-').toLowerCase() : `game-${index}`);
            card.setAttribute("data-id", internalGameId);

            const actionStarBtn = document.createElement("button");
            actionStarBtn.className = "gams-star-overlay-btn";
            actionStarBtn.innerHTML = "★";
            card.appendChild(actionStarBtn);

            if (bookmarksArray.includes(internalGameId)) {
                card.classList.add("is-gams-bookmarked");
            }

            actionStarBtn.addEventListener("click", (clickEvent) => {
                clickEvent.preventDefault();
                clickEvent.stopPropagation();

                if (bookmarksArray.includes(internalGameId)) {
                    bookmarksArray = bookmarksArray.filter(savedId => savedId !== internalGameId);
                    card.classList.remove("is-gams-bookmarked");
                } else {
                    bookmarksArray.push(internalGameId);
                    card.classList.add("is-gams-bookmarked");
                }

                localStorage.setItem("gams_v4_bookmarks", JSON.stringify(bookmarksArray));
                applyLayoutFlexSorting(gameCards);
            });
        });

        applyLayoutFlexSorting(gameCards);
    };

    function applyLayoutFlexSorting(cards) {
        cards.forEach(card => {
            const currentId = card.getAttribute("data-id");
            if (bookmarksArray.includes(currentId)) {
                card.style.order = "-1"; 
            } else {
                card.style.order = "0";
            }
        });
    }

   runLayoutOverwatch();
    setInterval(runLayoutOverwatch, 1000);
});
</script>

<script>
    const canvas = document.getElementById('spaceCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Track mouse to pull rain sideways
    let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    // Create the rain drop array
    const maxDrops = 100;
    const drops = [];

    for (let i = 0; i < maxDrops; i++) {
        drops.push({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            length: Math.random() * 20 + 10,   // Rain streak length
            speed: Math.random() * 2 + 1,      // Slow falling speed base
            opacity: Math.random() * 0.5 + 0.3 // Random transparency for depth
        });
    }

    function animate() {
        // Pure black background with a slight fade trail
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Neon Glow Setup
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#bc13fe'; // Neon purple aura

        drops.forEach(drop => {
            // Calculate mouse horizontal pull factor
            let mousePull = (mouse.x - window.innerWidth / 2) * 0.005;

            // Move the drop downward and slightly diagonal based on mouse position
            drop.y += drop.speed;
            drop.x += mousePull * drop.speed;

            // Draw the purple rain line streak
            ctx.beginPath();
            ctx.moveTo(drop.x, drop.y);
            ctx.lineTo(drop.x + (mousePull * 5), drop.y + drop.length);
            ctx.strokeStyle = `rgba(188, 19, 254, ${drop.opacity})`;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Reset drop to the top if it goes off screen
            if (drop.y > canvas.height) {
                drop.y = -drop.length;
                drop.x = Math.random() * canvas.width;
                drop.speed = Math.random() * 2 + 1;
            }
            // Wrap around horizontal edges if pulled by mouse
            if (drop.x > canvas.width) drop.x = 0;
            if (drop.x < 0) drop.x = canvas.width;
        });

        // Clear glow shadows so your site text/buttons stay sharp
        ctx.shadowBlur = 0;

        requestAnimationFrame(animate);
    }
    animate();
</script>

        <!-- 🌌 GAMS PORTAL SYSTEM INFRASTRUCTURE: BOOKMARKS & INTERACTIVE STARFIELD -->
<div id="gams-space-bg" style="position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:-1; pointer-events:none; background:#07070a;"></div>
<script>
document.addEventListener("DOMContentLoaded", () => {
    // ==========================================
    // 1. INTERACTIVE STARFIELD PHYSICS LAYER
    // ==========================================
    const bgContainer = document.getElementById("gams-space-bg");
    const starCanvas = document.createElement("canvas");
    starCanvas.style.position = "absolute";
    starCanvas.style.top = "0"; starCanvas.style.left = "0";
    starCanvas.style.width = "100%"; starCanvas.style.height = "100%";
    bgContainer.appendChild(starCanvas);
    
    const context = starCanvas.getContext("2d");
    let canvasWidth = starCanvas.width = window.innerWidth;
    let canvasHeight = starCanvas.height = window.innerHeight;

    const particlesArray = [];
    for (let i = 0; i < 75; i++) {
        particlesArray.push({
            x: Math.random() * canvasWidth,
            y: Math.random() * canvasHeight,
            radius: Math.random() * 1.5 + 0.4,
            speedX: (Math.random() - 0.5) * 0.2,
            speedY: (Math.random() - 0.5) * 0.2
        });
    }

    let mouseCoordinateX = 0, mouseCoordinateY = 0;
    window.addEventListener("mousemove", (event) => { mouseCoordinateX = event.clientX; mouseCoordinateY = event.clientY; });
    window.addEventListener("resize", () => { canvasWidth = starCanvas.width = window.innerWidth; canvasHeight = starCanvas.height = window.innerHeight; });

    function renderStarfieldAnimation() {
        context.clearRect(0, 0, canvasWidth, canvasHeight);
        context.fillStyle = "rgba(255, 255, 255, 0.25)";
        
        particlesArray.forEach(star => {
            star.x += star.speedX; star.y += star.speedY;
            if (star.x < 0 || star.x > canvasWidth) star.speedX *= -1;
            if (star.y < 0 || star.y > canvasHeight) star.speedY *= -1;

            let deltaX = mouseCoordinateX - star.x;
            let deltaY = mouseCoordinateY - star.y;
            let currentDistance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
            if (currentDistance < 120) {
                star.x -= (deltaX / currentDistance) * 0.2;
                star.y -= (deltaY / currentDistance) * 0.2;
            }

            context.beginPath();
            context.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
            context.fill();
        });
        requestAnimationFrame(renderStarfieldAnimation);
    }
    renderStarfieldAnimation();

    // ==========================================
    // 2. CARD BLUR HOVERS & SYSTEM STORAGE CORE
    // ==========================================
    const CARD_CLASS = ".game-link";
    
    const standaloneStyles = document.createElement('style');
    standaloneStyles.innerHTML = `
        body { background: #07070a !important; }
        .game-list { display: flex !important; flex-wrap: wrap !important; justify-content: center !important; }
        
        /* High-End Frosted Glass Cards Styling Layer */
        ${CARD_CLASS} {
            position: relative !important;
            background: rgba(255, 255, 255, 0.02) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            border-radius: 14px !important;
            padding: 12px !important;
            backdrop-filter: blur(10px) !important;
            -webkit-backdrop-filter: blur(10px) !important;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.35) !important;
            transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1), border-color 0.25s ease !important;
        }
        ${CARD_CLASS}:hover {
            transform: translateY(-6px) scale(1.02) !important;
            background: rgba(255, 255, 255, 0.05) !important;
            border-color: rgba(139, 92, 246, 0.4) !important;
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.15) !important;
        }
        
        /* Floating Star Overlay Buttons Setup */
        .gams-star-overlay-btn {
            position: absolute !important;
            top: 6px !important;
            right: 6px !important;
            z-index: 99999 !important;
            background: rgba(0, 0, 0, 0.75) !important;
            border: 1px solid rgba(255, 255, 255, 0.12) !important;
            border-radius: 50% !important;
            width: 26px !important;
            height: 26px !important;
            font-size: 13px !important;
            color: #555 !important;
            cursor: pointer !important;
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            transition: transform 0.1s ease, color 0.12s ease !important;
        }
        .gams-star-overlay-btn:hover { transform: scale(1.15) !important; }
        ${CARD_CLASS}.is-gams-bookmarked .gams-star-overlay-btn {
            color: #ffcc00 !important;
            text-shadow: 0 0 4px rgba(255, 204, 0, 0.6) !important;
        }
    `;
    document.head.appendChild(standaloneStyles);

    let bookmarksArray = JSON.parse(localStorage.getItem("gams_v4_bookmarks")) || [];

    const initGridMonitor = () => {
        const gameCards = document.querySelectorAll(CARD_CLASS);
        gameCards.forEach((card, index) => {
            if (card.querySelector('.gams-star-overlay-btn')) return;

            const titleTextNode = card.querySelector('div') || card.querySelector('p');
            const internalGameId = card.getAttribute("data-id") || (titleTextNode ? titleTextNode.innerText.trim().replace(/\s+/g, '-').toLowerCase() : `game-${index}`);
            card.setAttribute("data-id", internalGameId);

            const actionStarBtn = document.createElement("button");
            actionStarBtn.className = "gams-star-overlay-btn";
            actionStarBtn.innerHTML = "★";
            card.appendChild(actionStarBtn);

            if (bookmarksArray.includes(internalGameId)) {
                card.classList.add("is-gams-bookmarked");
            }

            actionStarBtn.addEventListener("click", (clickEvent) => {
                clickEvent.preventDefault();
                clickEvent.stopPropagation();

                if (bookmarksArray.includes(internalGameId)) {
                    bookmarksArray = bookmarksArray.filter(savedId => savedId !== internalGameId);
                    card.classList.remove("is-gams-bookmarked");
                } else {
                    bookmarksArray.push(internalGameId);
                    card.classList.add("is-gams-bookmarked");
                }

                localStorage.setItem("gams_v4_bookmarks", JSON.stringify(bookmarksArray));
                applyLayoutFlexSorting(gameCards);
            });
        });
        applyLayoutFlexSorting(gameCards);
    };

    function applyLayoutFlexSorting(cards) {
        cards.forEach(card => {
            const currentId = card.getAttribute("data-id");
            if (bookmarksArray.includes(currentId)) {
                card.style.order = "-1"; 
            } else {
                card.style.order = "0";
            }
        });
    }

    initGridMonitor();
    setInterval(initGridMonitor, 1000);
});
</script>
